
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Alka's Art Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="full-gallery">
    <header>
        <div class="logo-section">
            <img src="images/Logo.png" alt="Logo">
            <h1>Alka's Art Studio</h1>
        </div>
        <button id="menu-toggle">&#9776;</button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
        <button id="dark-mode-toggle">🌓</button>
    </header>

    <section class="gallery-section" id="gallery-section">
        <h2>Art Gallery</h2>
        <div class="masonry-grid" id="galleryGrid"></div>
    </section>

    <footer>
        <div class="footer-left">© 2025 Alka's Art Studio</div>
        <div class="footer-center">Follow us on social media</div>
        <div class="footer-right social-icons">
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
        </div>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
