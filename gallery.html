<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alka's Art Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/Logo.png" type="image/png">
</head>

<!-- Header Section -->
<header>
    <button id="dark-mode-toggle">🌙</button>
    <div class="logo-section">
        <a href="index.html"><img src="images/Logo.png" alt="Alka Art Studio Logo"></a>
        <h1>Alka Art Studio</h1>
    </div>
    <nav>
        <ul>
            <li><a href="index.html#home">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="index.html#workshops">Workshops & Events</a></li>
            <li><a href="index.html#shop">Shop</a></li>
            <li><a href="index.html#contact">Contact Us</a></li>
            <li><a href="index.html#about">About Us</a></li>
        </ul>
    </nav>
</header>

<!-- Full Gallery -->
<section class="gallery-section">
    <h2>Art Gallery</h2>
    <div class="masonry-grid" id="fullGalleryGrid">
        <!-- All images will be injected here -->
    </div>
</section>

<script>
// Load all available images (example: 29 images)
const fullGalleryGrid = document.getElementById('fullGalleryGrid');
const totalImages = 29; // Adjust based on how many images you have

for (let i = 1; i <= totalImages; i++) {
    const img = document.createElement('img');
    img.src = `images/Artwork/image${i}.jpg`; // Try .jpg first
    img.alt = `Artwork ${i}`;
    img.loading = 'lazy'; // Better performance
    img.style.width = '100%';
    img.style.borderRadius = '12px';
    img.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';

    // If .jpg fails, try .png
    img.onerror = function () {
        img.onerror = null; // Prevent infinite loop
        img.src = `images/Artwork/image${i}.png`;
    };

    fullGalleryGrid.appendChild(img);
}
</script>

<!-- Footer Section -->
<footer style="text-align: center; padding: 20px; margin-top: 50px;">
    <p>&copy; 2025 Alka's Art Studio. All rights reserved.</p>

</body>
