<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Alka Art Studio</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            color: #333;
            background-color: #f5f5f5;
        }
        header {
            background-color: #8abeb2;
            padding: 10px 0;
            text-align: center;
        }
        header h1 {
            margin: 0;
            color: #fff;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #444;
        }
        nav ul li {
            display: inline;
        }
        nav ul li a {
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            display: inline-block;
        }
        nav ul li a:hover {
            background-color: #8abeb2;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        footer {
            background-color: #444;
            color: #fff;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .contact-form {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .contact-form button {
            background-color: #8abeb2;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        .contact-form button:hover {
            background-color: #6d9a90;
        }
        .social-icons a {
            display: inline-block;
            margin: 10px;
            color: #8abeb2;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Welcome to Alka Art Studio</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#workshops">Workshops</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#events">Events</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="content" id="contact">
        <h2>Get in Touch</h2>
        <p>For collaborations, workshops, and custom art, reach out to us!</p>
        
        <div class="contact-form">
            <form action="mailto:alkaartstudio@gmail.com" method="post" enctype="text/plain">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>

                <label>Your Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>

                <label>Message</label>
                <textarea rows="5" name="message" placeholder="Your message here..." required></textarea>

                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <!-- Social Icons -->
    <div class="content">
        <h3>Connect with Us</h3>
        <div class="social-icons">
            <a href="https://www.instagram.com/alkaartjournal/" target="_blank"><i class="fa fa-instagram"></i></a>
            <a href="https://www.facebook.com/alkaartjournal/" target="_blank"><i class="fa fa-facebook"></i></a>
            <a href="https://www.youtube.com/alkaartjournal" target="_blank"><i class="fa fa-youtube"></i></a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Alka Art Studio. All rights reserved.</p>
    </footer>
</body>
</html>
