<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art & Craft Store</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff8f0;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #ff9a8b;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        nav {
            background-color: #ff6f61;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 40px 20px;
            text-align: center;
        }

        .hero {
            margin-bottom: 40px;
        }

        .hero h2 {
            font-size: 2rem;
            color: #ff6f61;
        }

        .hero p {
            font-size: 1.2rem;
            margin: 10px 0 20px;
        }

        .cta-button {
            background-color: #ff6f61;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .cta-button:hover {
            background-color: #e65c50;
        }

        footer {
            background-color: #ffe0d6;
            text-align: center;
            padding: 15px;
            position: relative;
            bottom: 0;
            width: 100%;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }

            .hero h2 {
                font-size: 1.5rem;
            }

            .hero p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Art & Craft Store</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Workshops</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <section class="hero">
            <h2>Unleash Your Creativity!</h2>
            <p>Explore our collection of premium art supplies and join our inspiring workshops.</p>
            <button class="cta-button">Shop Now</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Art & Craft Store. All rights reserved.</p>
    </footer>
</body>
</html>
